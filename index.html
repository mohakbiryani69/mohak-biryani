
  
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohak Biryani</title>

<!-- 🔥 PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  scroll-behavior:smooth;
}

.navbar {
  position:fixed;
  width:100%;
  top:0;
  background:rgba(15,23,42,0.8);
  padding:15px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

section { padding:100px 20px; }

.hero {
  background:url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d') center/cover;
  position:relative;
}
.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.hero-content { position:relative; z-index:1; }

.btn {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.payment-box {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

.fade {
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="navbar">
  <h3>Mohak Biryani</h3>
</div>

<section class="hero fade">
  <div class="hero-content">
    <h1>Mohak Biryani 🍛</h1>
    <button class="btn" onclick="scrollToSection('order')">Order Now</button>
  </div>
</section>

<section id="order" class="fade">
  <h2>🛒 Place Order</h2>

  <div class="payment-box">

    <label>Select Biryani</label>
    <select id="item">
      <option value="Chicken Biryani|180">Chicken Biryani - ₹180</option>
      <option value="Mutton Biryani|260">Mutton Biryani - ₹260</option>
      <option value="Veg Biryani|140">Veg Biryani - ₹140</option>
    </select>

    <label>Quantity</label>
    <input type="number" id="qty" value="1">

    <label>Note</label>
    <textarea id="note"></textarea>

    <button class="btn" onclick="placeOrder()">Proceed</button>

    <div id="invoice" style="margin-top:20px;"></div>

    <!-- PDF BUTTON -->
    <button class="btn" onclick="downloadPDF()">Download Invoice PDF</button>

  </div>
</section>

<script>
let invoiceData = {};

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function placeOrder(){

  let itemData = document.getElementById("item").value.split("|");
  let name = itemData[0];
  let price = parseInt(itemData[1]);

  let qty = parseInt(document.getElementById("qty").value);
  let note = document.getElementById("note").value;

  let subtotal = price * qty;
  let gst = subtotal * 0.05;
  let delivery = 50;
  let total = subtotal + gst + delivery;

  // store data for PDF
  invoiceData = {name, qty, subtotal, gst, delivery, total};

  document.getElementById("invoice").innerHTML = `
    <h3>🧾 Invoice</h3>
    Item: ${name}<br>
    Qty: ${qty}<br>
    Subtotal: ₹${subtotal}<br>
    GST: ₹${gst.toFixed(2)}<br>
    Delivery: ₹50<br>
    <b>Total: ₹${total.toFixed(2)}</b>
  `;

  let msg = `Order:%0A${name}%0AQty:${qty}%0ATotal:₹${total.toFixed(2)}`;
  window.open(`https://wa.me/917488690713?text=${msg}`);

  let upi = `upi://pay?pa=7488690713@ptyes&am=${total.toFixed(2)}&cu=INR`;
  setTimeout(()=>{ window.location.href = upi; },1500);
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Mohak Biryani Invoice", 20, 20);
  doc.text(`Item: ${invoiceData.name}`, 20, 40);
  doc.text(`Quantity: ${invoiceData.qty}`, 20, 50);
  doc.text(`Subtotal: ₹${invoiceData.subtotal}`, 20, 60);
  doc.text(`GST: ₹${invoiceData.gst}`, 20, 70);
  doc.text(`Delivery: ₹50`, 20, 80);
  doc.text(`Total: ₹${invoiceData.total}`, 20, 90);

  doc.save("invoice.pdf");
}

const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
